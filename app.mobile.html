<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <title>Neura UI</title>
  <!-- Full-screen standalone when added to the home screen (iOS + Android) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Fonts: Kamand (Persian body), Neogrey (Latin display), Font Awesome -->
  <style>
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css');
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-Light.woff2') format('woff2'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-Medium.woff2') format('woff2'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-Bold.woff2') format('woff2'); font-weight: 600 700; font-display: swap; }
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-ExtraBold.woff2') format('woff2'); font-weight: 800; font-display: swap; }
    @font-face { font-family: 'Kamand'; src: url('src/fonts/Kamand-Black.woff2') format('woff2'); font-weight: 900; font-display: swap; }

    html, body { height: 100%; margin: 0; }
    #root { height: 100%; }
  </style>

  <!-- Tailwind v4 (browser build) — scans the DOM + processes the theme block below -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Neura theme tokens (processed by Tailwind v4) -->
  <style type="text/tailwindcss">

      --background: #ffffff;
      --foreground: oklch(0.145 0 0);

      --card-foreground: oklch(0.145 0 0);

      --popover-foreground: oklch(0.145 0 0);

      --muted: #ececf0;
      --muted-foreground: #717182;
      --accent: #e9ebef;
      --accent-foreground: #030213;
      --destructive: #d4183d;
      --destructive-foreground: #ffffff;
      --border: rgba(0, 0, 0, 0.1);
      --input: transparent;
      --input-background: #f3f3f5;
      --switch-background: #cbced4;
      --font-weight-medium: 500;
      --font-weight-normal: 400;

      --sidebar-ring: oklch(0.708 0 0);
    }

    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.145 0 0);
      --card-foreground: oklch(0.985 0 0);
      --popover: oklch(0.145 0 0);
      --popover-foreground: oklch(0.985 0 0);
      --primary: oklch(0.985 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.396 0.141 25.723);
      --destructive-foreground: oklch(0.637 0.237 25.331);
      --border: oklch(0.269 0 0);
      --input: oklch(0.269 0 0);
      --ring: oklch(0.439 0 0);
      --font-weight-medium: 500;
      --font-weight-normal: 400;
      --chart-1: oklch(0.488 0.243 264.376);
      --chart-2: oklch(0.696 0.17 162.48);
      --chart-3: oklch(0.769 0.188 70.08);
      --chart-4: oklch(0.627 0.265 303.9);
      --chart-5: oklch(0.645 0.246 16.439);
      --sidebar: oklch(0.205 0 0);
      --sidebar-foreground: oklch(0.985 0 0);
      --sidebar-primary: oklch(0.488 0.243 264.376);
      --sidebar-primary-foreground: oklch(0.985 0 0);
      --sidebar-accent: oklch(0.269 0 0);
      --sidebar-accent-foreground: oklch(0.985 0 0);
      --sidebar-border: oklch(0.269 0 0);
      --sidebar-ring: oklch(0.439 0 0);
    }

    @theme inline {
      --color-background: var(--background);
      --color-foreground: var(--foreground);
      --color-card: var(--card);
      --color-card-foreground: var(--card-foreground);
      --color-popover: var(--popover);
      --color-popover-foreground: var(--popover-foreground);
      --color-primary: var(--primary);
      --color-primary-foreground: var(--primary-foreground);
      --color-secondary: var(--secondary);
      --color-secondary-foreground: var(--secondary-foreground);
      --color-muted: var(--muted);
      --color-muted-foreground: var(--muted-foreground);
      --color-accent: var(--accent);
      --color-accent-foreground: var(--accent-foreground);
      --color-destructive: var(--destructive);
      --color-destructive-foreground: var(--destructive-foreground);
      --color-border: var(--border);
      --color-input: var(--input);
      --color-input-background: var(--input-background);
      --color-switch-background: var(--switch-background);
      --color-ring: var(--ring);
      --color-chart-1: var(--chart-1);
      --color-chart-2: var(--chart-2);
      --color-chart-3: var(--chart-3);
      --color-chart-4: var(--chart-4);
      --color-chart-5: var(--chart-5);
      --radius-sm: calc(var(--radius) - 4px);
      --radius-md: calc(var(--radius) - 2px);
      --radius-lg: var(--radius);
      --radius-xl: calc(var(--radius) + 4px);
      --color-sidebar: var(--sidebar);
      --color-sidebar-foreground: var(--sidebar-foreground);
      --color-sidebar-primary: var(--sidebar-primary);
      --color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
      --color-sidebar-accent: var(--sidebar-accent);
      --color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
      --color-sidebar-border: var(--sidebar-border);
      --color-sidebar-ring: var(--sidebar-ring);
    }

    @layer base {
      * { @apply border-border outline-ring/50; }
      body { @apply bg-background text-foreground; }
      html { font-size: var(--font-size); }
      h1 { font-size: var(--text-2xl); font-weight: var(--font-weight-medium); line-height: 1.5; }
      h2 { font-size: var(--text-xl); font-weight: var(--font-weight-medium); line-height: 1.5; }
      h3 { font-size: var(--text-lg); font-weight: var(--font-weight-medium); line-height: 1.5; }
      h4 { font-size: var(--text-base); font-weight: var(--font-weight-medium); line-height: 1.5; }
      label { font-size: var(--text-base); font-weight: var(--font-weight-medium); line-height: 1.5; }
      button { font-size: var(--text-base); font-weight: var(--font-weight-medium); line-height: 1.5; }
      input { font-size: var(--text-base); font-weight: var(--font-weight-normal); line-height: 1.5; }
    }
  </style>

  <!-- Neura runtime theme system (plain CSS — dark / light / bw / glass) -->
  <style>
    :root, [data-theme="dark"] {
      --aw-primary: #7B62FC; --aw-primary-dark: #5C4ABD; --aw-primary-light: #A599FC; --aw-primary-bg: rgba(123,98,252,0.18);
      --aw-secondary: #00E676; --aw-secondary-dark: #00C853; --aw-accent: #8169ff; --aw-danger: #FF383C; --aw-danger-bg: rgba(255,56,60,0.14);
      --aw-bg-app: #15131A; --aw-bg-card: rgba(255,255,255,0.04); --aw-bg-card-hover: rgba(255,255,255,0.09); --aw-bg-input: rgba(255,255,255,0.05); --aw-bg-header: rgba(21,19,26,0.30); --aw-bg-modal: rgba(28,26,36,0.82);
      --aw-text-primary: #FDFDFD; --aw-text-secondary: #CCCCCC; --aw-text-muted: #8F8F8F;
      --aw-border: rgba(217,217,217,0.28); --aw-border-light: rgba(217,217,217,0.12); --aw-shadow: 0 4px 4px rgba(123,98,252,0.20); --aw-shadow-sm: 0 4px 4px rgba(123,98,252,0.20);
      --aw-bubble-sent: linear-gradient(135deg, #8169ff, #5c4abd); --aw-bubble-sent-solid: #7B62FC; --aw-bubble-recv: rgba(255,255,255,0.06);
      --aw-online: #00E676; --aw-offline: #8F8F8F;
      --aw-eu-primary: #7B62FC; --aw-eu-primary-dark: #5C4ABD; --aw-eu-bg: #15131A; --aw-eu-card: rgba(255,255,255,0.04); --aw-logo-filter: none;
      --aw-eu-nav-bg: rgba(255,255,255,0.04); --aw-eu-nav-border: rgba(217,217,217,0.30);
      --aw-eu-glass-card: rgba(255,255,255,0.04); --aw-eu-glass-bd: rgba(217,217,217,0.30); --aw-eu-ink-strong: #FDFDFD;
      --aw-chat-bg: rgba(21,19,26,0.62); --aw-chat-surface: rgba(255,255,255,0.04); --aw-chat-recv: rgba(255,255,255,0.07); --aw-chat-field: rgba(255,255,255,0.04); --aw-chat-bd: rgba(217,217,217,0.22);
    }
    [data-theme="light"] {
      --aw-primary: #9B59B6; --aw-primary-dark: #7E4FA2; --aw-primary-light: #C39BD3; --aw-primary-bg: rgba(155,89,182,0.08);
      --aw-secondary: #00C853; --aw-secondary-dark: #00A844; --aw-accent: #B83D9E; --aw-danger: #ef4444; --aw-danger-bg: rgba(239,68,68,0.08);
      --aw-bg-app: #F5F3FA; --aw-bg-card: #FFFFFF; --aw-bg-card-hover: #F0ECF9; --aw-bg-input: #EDE8F5; --aw-bg-header: rgba(245,243,250,0.95); --aw-bg-modal: #FFFFFF;
      --aw-text-primary: #1A1335; --aw-text-secondary: #5E4F7A; --aw-text-muted: #9A8CB5;
      --aw-border: rgba(100,70,150,0.12); --aw-border-light: rgba(100,70,150,0.06); --aw-shadow: 0 4px 24px rgba(100,70,150,0.10); --aw-shadow-sm: 0 2px 8px rgba(100,70,150,0.08);
      --aw-bubble-sent: linear-gradient(135deg, #B83D9E, #7E5FAA); --aw-bubble-sent-solid: #9B59B6; --aw-bubble-recv: #EDE8F5;
      --aw-online: #00C853; --aw-offline: #9A8CB5;
      --aw-eu-primary: #7E5FAA; --aw-eu-primary-dark: #6A4E92; --aw-eu-bg: #F5F3FA; --aw-eu-card: #FFFFFF; --aw-logo-filter: none;
      --aw-chat-bg: rgba(240,238,250,0.62); --aw-chat-surface: #FFFFFF; --aw-chat-recv: #FFFFFF; --aw-chat-field: #EDE8F5; --aw-chat-bd: rgba(100,70,150,0.12);
    }
    [data-theme="bw"] {
      --aw-primary: #555555; --aw-primary-dark: #333333; --aw-primary-light: #888888; --aw-primary-bg: rgba(80,80,80,0.06);
      --aw-secondary: #666666; --aw-secondary-dark: #444444; --aw-accent: #555555; --aw-danger: #D32F2F; --aw-danger-bg: rgba(211,47,47,0.08);
      --aw-bg-app: #FFFFFF; --aw-bg-card: #F5F5F5; --aw-bg-card-hover: #EEEEEE; --aw-bg-input: #E8E8E8; --aw-bg-header: rgba(255,255,255,0.95); --aw-bg-modal: #FFFFFF;
      --aw-text-primary: #111111; --aw-text-secondary: #555555; --aw-text-muted: #999999;
      --aw-border: rgba(0,0,0,0.12); --aw-border-light: rgba(0,0,0,0.05); --aw-shadow: 0 4px 24px rgba(0,0,0,0.08); --aw-shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --aw-bubble-sent: linear-gradient(135deg, #444444, #222222); --aw-bubble-sent-solid: #333333; --aw-bubble-recv: #EEEEEE;
      --aw-online: #4CAF50; --aw-offline: #999999;
      --aw-eu-primary: #555555; --aw-eu-primary-dark: #333333; --aw-eu-bg: #FFFFFF; --aw-eu-card: #F5F5F5; --aw-logo-filter: grayscale(100%) contrast(1.2);
    }
    [data-theme="glass"] {
      --aw-primary: #7b62fc; --aw-primary-dark: #5c4abd; --aw-primary-light: #a599fc; --aw-primary-bg: rgba(123,98,252,0.12);
      --aw-secondary: #00C853; --aw-secondary-dark: #00A844; --aw-accent: #8169ff; --aw-danger: #ef4444; --aw-danger-bg: rgba(239,68,68,0.10);
      --aw-bg-app: #ededf2; --aw-bg-card: rgba(255,255,255,0.45); --aw-bg-card-hover: rgba(255,255,255,0.65); --aw-bg-input: rgba(255,255,255,0.55); --aw-bg-header: rgba(255,255,255,0.25); --aw-bg-modal: rgba(255,255,255,0.78);
      --aw-text-primary: #565656; --aw-text-secondary: #737373; --aw-text-muted: #8f8f8f;
      --aw-border: rgba(255,255,255,0.75); --aw-border-light: rgba(255,255,255,0.45); --aw-shadow: 0 4px 24px rgba(123,98,252,0.20); --aw-shadow-sm: 0 4px 4px rgba(123,98,252,0.20);
      --aw-bubble-sent: linear-gradient(135deg, #8169ff, #5c4abd); --aw-bubble-sent-solid: #7b62fc; --aw-bubble-recv: rgba(255,255,255,0.55);
      --aw-online: #00C853; --aw-offline: #8f8f8f;
      --aw-eu-primary: #7b62fc; --aw-eu-primary-dark: #5c4abd; --aw-eu-bg: #ededf2; --aw-eu-card: rgba(255,255,255,0.45); --aw-logo-filter: none;
      --aw-eu-nav-bg: rgba(255,255,255,0.2); --aw-eu-nav-border: rgba(255,255,255,0.5);
      --aw-chat-bg: rgba(240,238,250,0.55); --aw-chat-surface: rgba(255,255,255,0.5); --aw-chat-recv: rgba(255,255,255,0.7); --aw-chat-field: rgba(255,255,255,0.55); --aw-chat-bd: rgba(255,255,255,0.8);
    }
    [data-theme="glass"] header, [data-theme="glass"] nav, [data-theme="glass"] aside,
    [data-theme="dark"] header, [data-theme="dark"] nav, [data-theme="dark"] aside {
      backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2);
    }
    /* Dark theme = glass structure, recoloured per Figma dark sample */
    [data-theme="dark"] .aw-glass-bg { background: #15131A; }
    [data-theme="dark"] .aw-glass-bg .blob-1 { background: #7b62fc; opacity: 0.42; }
    [data-theme="dark"] .aw-glass-bg .blob-2 { background: #b83d9e; opacity: 0.30; }
    [data-theme="dark"] .aw-glass-bg .blob-3 { background: #5c4abd; opacity: 0.38; }
    [data-theme="dark"] .aw-glass-bg .blob-4 { background: #38bdf8; opacity: 0.20; }
    [data-theme="dark"] .aw-glass-bg .blob-5 { background: #8169ff; opacity: 0.30; }
    [data-theme="dark"] .aw-glass-bg .blob-6 { background: linear-gradient(135deg, #5c4abd, #b83d9e); opacity: 0.32; }
    [data-theme="dark"] .aw-bg-card, [data-theme="dark"] .aw-bg-modal { backdrop-filter: blur(14px) saturate(1.1); -webkit-backdrop-filter: blur(14px) saturate(1.1); }
    .aw-glass-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; background: #ededf2; }
    .aw-glass-bg .blob { position: absolute; filter: blur(60px); border-radius: 9999px; }
    .aw-glass-bg .blob-1 { width: 200px; height: 200px; background: #8169ff; top: 8%; left: -10%; opacity: 0.55; }
    .aw-glass-bg .blob-2 { width: 160px; height: 320px; background: #e2e0ed; top: 0; left: 48%; opacity: 0.9; }
    .aw-glass-bg .blob-3 { width: 120px; height: 120px; background: #5c4abd; top: 55%; right: -6%; opacity: 0.45; }
    .aw-glass-bg .blob-4 { width: 180px; height: 90px; background: #5c4abd; bottom: 6%; left: 30%; opacity: 0.4; }
    .aw-glass-bg .blob-5 { width: 150px; height: 150px; background: #dcdcdc; top: 35%; left: 35%; opacity: 0.7; }
    .aw-glass-bg .blob-6 { width: 220px; height: 100px; bottom: 22%; left: -12%; opacity: 0.5; background: linear-gradient(135deg, #5c4abd, #8f8f8f); }
    body { background: var(--aw-bg-app) !important; color: var(--aw-text-primary) !important; overflow: hidden; font-family: 'Kamand', 'Vazirmatn', 'IRANSans', system-ui, sans-serif; }

    /* Admin panel: recolour purple/lilac → cyan-blue (logo palette) */
    .neura-admin {
      --aw-primary: #2E86FF; --aw-primary-dark: #1B4FE8; --aw-primary-light: #5FD2EC; --aw-primary-bg: rgba(46,134,255,0.10);
      --aw-accent: #22A6F0;
      --aw-eu-primary: #2E86FF; --aw-eu-primary-dark: #1B4FE8;
      --aw-bubble-sent: linear-gradient(135deg, #3FD9E8, #1E6BFF); --aw-bubble-sent-solid: #2E86FF;
    }
    [data-theme="dark"] .neura-admin {
    }
    .neura-admin .aw-bg-purple { background: linear-gradient(135deg,#3FD9E8,#1E6BFF) !important; }
    .neura-admin .aw-bg-indigo { background: linear-gradient(135deg,#22A6F0,#1B4FE8) !important; }
    .neura-admin .aw-bg-pink { background: linear-gradient(135deg,#3FD9E8,#22A6F0) !important; }

    /* Designed icon-pack: recolour per theme (icons are purple by default) */
    .nav-icon-img { transition: filter 0.2s; }
    .neura-admin .nav-icon-img { filter: hue-rotate(-32deg) saturate(1.12); }
    [data-theme="dark"] .nav-icon-img { filter: brightness(1.12) saturate(1.05); }
    [data-theme="dark"] .neura-admin .nav-icon-img { filter: hue-rotate(-32deg) saturate(1.12) brightness(1.12); }
    [data-theme="bw"] .nav-icon-img { filter: grayscale(1) brightness(0.85); }
    [data-theme="bw"] .letter-avatar { filter: grayscale(1) brightness(0.92); }
    .neura-admin .letter-avatar { filter: hue-rotate(-26deg) saturate(1.08); }

    /* ── Global text-fit safety net ──────────────────────────────
       Keeps long text from overflowing or clipping its card/frame,
       without touching individual components. */
    .aw-app * { min-width: 0; }                         /* let flex children shrink so truncate works */
    .aw-app p, .aw-app span, .aw-app div, .aw-app h1, .aw-app h2, .aw-app h3, .aw-app h4, .aw-app label, .aw-app button {
      overflow-wrap: anywhere;                           /* break long unbroken strings (URLs, big numbers) */
    }
    /* don't break the tiny round badges / numeric chips */
    .aw-app .truncate { overflow-wrap: normal; }
    /* numerals & latin in mixed RTL keep their own direction so they don't smear */
    .aw-num { unicode-bidi: plaintext; }

    /* Admin glass background blobs → blue/cyan */
    .aw-glass-bg.admin-bg .blob-1 { background: #3FD9E8; }
    .aw-glass-bg.admin-bg .blob-2 { background: #dceaff; }
    .aw-glass-bg.admin-bg .blob-3 { background: #1E6BFF; }
    .aw-glass-bg.admin-bg .blob-4 { background: #1B4FE8; }
    .aw-glass-bg.admin-bg .blob-5 { background: #cfe4ff; }
    .aw-glass-bg.admin-bg .blob-6 { background: linear-gradient(135deg, #1E6BFF, #3FD9E8); }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-1 { background: #2E86FF; opacity: 0.42; }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-2 { background: #22A6F0; opacity: 0.30; }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-3 { background: #1B4FE8; opacity: 0.38; }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-4 { background: #38bdf8; opacity: 0.22; }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-5 { background: #3FD9E8; opacity: 0.28; }
    [data-theme="dark"] .aw-glass-bg.admin-bg .blob-6 { background: linear-gradient(135deg, #1B4FE8, #3FD9E8); opacity: 0.32; }
    [data-theme="dark"] body { background:
        radial-gradient(640px 440px at 50% -8%, rgba(123,98,252,0.22), transparent 62%),
        radial-gradient(540px 380px at 96% 6%, rgba(255,56,60,0.10), transparent 60%),
        radial-gradient(560px 380px at 2% 20%, rgba(184,61,158,0.12), transparent 60%),
        #15131A !important; }

  <!-- Inlined virtual filesystem (source + assets) for standalone/offline use -->
  <script src="vfs-text.js"></script>
  <script src="vfs-img1.js"></script>
  <script src="vfs-img2.js"></script>
  <script src="vfs-fonts.js"></script>
  <script>
  (function(){
    var F = window.__VFS_FONTS__ || {};
    var faces = [
      ['Kamand','Kamand-Light.woff2','300','woff2'],
      ['Kamand','Kamand-Regular.woff2','400','woff2'],
      ['Kamand','Kamand-Medium.woff2','500','woff2'],
      ['Kamand','Kamand-Bold.woff2','600 700','woff2'],
      ['Kamand','Kamand-ExtraBold.woff2','800','woff2'],
      ['Kamand','Kamand-Black.woff2','900','woff2'],
      ['Neogrey','NeogreyMedium.otf','400 700','opentype'],
      ['Vazirmatn','Kamand-Regular.woff2','400','woff2']
    ];
    var css = '';
    faces.forEach(function(f){ var d=F[f[1]]; if(!d) return; css += '@font-face{font-family:\''+f[0]+'\';src:url('+d+') format(\''+f[3]+'\');font-weight:'+f[2]+';font-display:swap;}'; });
    var IMG = window.__VFS_IMG__ || {};
    var cp = IMG['src/assets/chat-pattern.png'];
    if(cp) css += '.aw-chat-pattern::before{background-image:url('+cp+') !important;}';
    var st = document.createElement('style'); st.textContent = css; document.head.appendChild(st);

    var rx = /src\/[^?#'"\)]*\.(?:png|jpe?g|svg|webp)/i;
    function fixImg(el){
      var raw = el.getAttribute('src'); if(!raw || raw.indexOf('data:')===0) return;
      var m = raw.match(rx); if(!m) return; var u = IMG[m[0]];
      if(u && el.getAttribute('src')!==u){ el.setAttribute('src', u); }
    }
    function fixBg(el){
      var bi = el.style && el.style.backgroundImage; if(!bi || bi.indexOf('src/')<0) return;
      var m = bi.match(rx); if(!m) return; var u = IMG[m[0]];
      if(u) el.style.backgroundImage = "url('"+u+"')";
    }
    function sweep(root){
      try{
        (root.querySelectorAll ? root.querySelectorAll('img') : []).forEach(fixImg);
        (root.querySelectorAll ? root.querySelectorAll('[style*="src/"]') : []).forEach(fixBg);
      }catch(e){}
    }
    var mo = new MutationObserver(function(muts){
      muts.forEach(function(m){
        if(m.type==='attributes' && m.target){
          if(m.target.tagName==='IMG') fixImg(m.target);
          if(m.attributeName==='style') fixBg(m.target);
        }
        if(m.addedNodes){ m.addedNodes.forEach(function(n){ if(n.nodeType===1){ if(n.tagName==='IMG') fixImg(n); sweep(n); } }); }
      });
    });
    function start(){ mo.observe(document.documentElement, {subtree:true, childList:true, attributes:true, attributeFilter:['src','style']}); sweep(document); }
    if(document.body) start(); else document.addEventListener('DOMContentLoaded', start);
    var n=0, iv=setInterval(function(){ sweep(document); if(++n>40) clearInterval(iv); }, 200);
  })();
  </script>

  <!-- Babel: transpile the app's real .tsx/.ts source in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.4/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="boot"><div class="ring"></div><div>در حال بارگذاری Neura…</div></div>
  </div>

  <script type="module">
    const ENTRY = 'src/app/App.tsx';
    window.__IMPORT_META__ = { env: { PROD: false, DEV: true, MODE: 'development' }, url: document.baseURI };
    const boot = document.getElementById('boot');
    const fail = (e) => {
      console.error(e);
      if (boot) boot.innerHTML = '<div style="font-size:18px;color:#ffb4b4">خطا در بارگذاری برنامه</div><div class="err">' +
        String(e && (e.stack || e.message || e)).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</div>';
    };
    window.addEventListener('error', ev => fail(ev.error || ev.message));
    window.addEventListener('unhandledrejection', ev => fail(ev.reason));

    // ---- module graph (cycle-safe CommonJS registry) ----
    const registry = {};          // key -> { factory, depMap } | reserved {}
    const instances = {};         // key -> { exports }
    const bareSet = new Set();    // npm specifiers resolved via import map
    const bareMap = {};           // specifier -> live ES module namespace
    const textCache = new Map();

    const isBare = (s) => !s.startsWith('.') && !s.startsWith('/') && !s.startsWith('figma:');
    const assetUrl = (s) => new URL('src/assets/' + s.replace('figma:asset/', ''), document.baseURI).href;

    async function tryFetch(path) {
      if (textCache.has(path)) return textCache.get(path);
      let out = null;
      if (window.__VFS_TEXT__ && Object.prototype.hasOwnProperty.call(window.__VFS_TEXT__, path)) { out = window.__VFS_TEXT__[path]; }
      else { try { const r = await fetch(encodeURI(path)); if (r.ok) out = await r.text(); } catch (_) {} }
      textCache.set(path, out); return out;
    }
    async function resolvePath(spec, importer) {
      const baseDir = importer.replace(/[^/]*$/, '');
      const norm = new URL(spec, 'app:///' + baseDir).pathname.replace(/^\//, '');
      const cands = /\.(tsx?|jsx?|css)$/.test(norm)
        ? [norm]
        : [norm + '.tsx', norm + '.ts', norm + '.jsx', norm + '.js', norm + '/index.tsx', norm + '/index.ts', norm + '/index.jsx', norm + '/index.js'];
      for (const c of cands) { if ((await tryFetch(c)) !== null) return c; }
      throw new Error('Cannot resolve "' + spec + '" from "' + importer + '"');
    }

    function transpile(src, path) {
      const isTsx = /\.(tsx|jsx)$/.test(path);
      const esm = Babel.transform(src, {
        filename: path,
        presets: [['typescript', { isTSX: isTsx, allExtensions: true, allowDeclareFields: true }], ['react', { runtime: 'automatic' }]],
      }).code;
      const cjs = Babel.transform(esm, { filename: path, plugins: ['transform-modules-commonjs'] }).code;
      // import.meta is illegal inside a non-module Function factory — shim it
      return cjs.replace(/import\.meta/g, '__IMPORT_META__');
    }
    function collectRequires(code) {
      const out = new Set(); const re = /require\(\s*['"]([^'"]+)['"]\s*\)/g; let m;
      while ((m = re.exec(code))) out.add(m[1]);
      return [...out];
    }

    async function discover(path) {
      if (registry[path]) return;
      registry[path] = {};                       // reserve (cycle guard)
      const src = await tryFetch(path);
      if (src === null) throw new Error('Missing file: ' + path);
      const code = transpile(src, path);
      const depMap = {};
      for (const spec of collectRequires(code)) {
        if (isBare(spec)) { bareSet.add(spec); depMap[spec] = spec; }
        else if (spec.startsWith('figma:asset/')) {
          const url = assetUrl(spec); depMap[spec] = spec;
          registry[spec] = { factory: (_r, m) => { m.exports = url; }, depMap: {} };
        } else if (spec.endsWith('.css')) {
          depMap[spec] = spec;
          registry[spec] = { factory: (_r, m) => { m.exports = {}; }, depMap: {} };
        } else {
          const child = await resolvePath(spec, path);
          depMap[spec] = child;
          await discover(child);
        }
      }
      const factory = new Function('require', 'module', 'exports', code);
      registry[path] = { factory, depMap };
    }

    function req(spec, importerKey) {
      let key = spec;
      const imp = importerKey != null ? registry[importerKey] : null;
      if (imp && imp.depMap && imp.depMap[spec] !== undefined) key = imp.depMap[spec];
      if (bareMap[key]) return bareMap[key];
      const mod = registry[key];
      if (!mod || !mod.factory) throw new Error('Module not available: ' + spec + (importerKey ? ' (from ' + importerKey + ')' : ''));
      if (instances[key]) return instances[key].exports;
      const m = { exports: {} }; instances[key] = m;
      mod.factory((s) => req(s, key), m, m.exports);
      return m.exports;
    }

    (async () => {
      try {
        await discover(ENTRY);
        // preload all npm deps through the import map (single React instance)
        await Promise.all([...bareSet].map(async (b) => { bareMap[b] = await import(b); }));

        const React = bareMap['react'] || await import('react');
        const { createRoot } = await import('react-dom/client');

        const appExports = req(ENTRY, null);
        const App = appExports.default || appExports.App;
        if (!App) throw new Error('App.tsx has no default export');

        const rootEl = document.getElementById('root');
        rootEl.innerHTML = '';
        createRoot(rootEl).render(React.createElement(App));
      } catch (e) { fail(e); }
    })();
  </script>
