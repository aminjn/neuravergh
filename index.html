<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Neura UI</title>
  <!-- Full-screen standalone when added to the home screen (iOS + Android) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Neura" />
  <meta name="theme-color" content="#0B0A0E" />

  <style>
    /* boot overlay shown until React mounts */
    #boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: #0D0B2E; color: #F0ECF9; font-family: 'Vazirmatn', system-ui, sans-serif; z-index: 9999; }
    #boot .ring { width: 44px; height: 44px; border-radius: 50%; border: 3px solid rgba(155,89,182,0.25); border-top-color: #9B59B6; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><div class="ring"></div><div>در حال بارگذاری Neura…</div></div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
