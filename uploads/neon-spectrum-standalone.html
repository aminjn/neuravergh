<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Spectrum</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  /* The visualizer fills its container. Change #neon-spectrum's size/background
     to embed it anywhere. */
  #neon-spectrum {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #ffffff;          /* set to #08070d for the dark variant */
    overflow: hidden;
  }
  #neon-spectrum canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="neon-spectrum"><canvas></canvas></div>

  <script>
  (function () {
    // ---- options (tweak freely) -------------------------------------------
    var DARK          = false;  // true => neon-on-black, false => neon-on-white
    var MOTION_SPEED  = 1;      // animation speed
    var WAVE_INTENSITY = 1;     // how far the wave streams swing out
    // -----------------------------------------------------------------------

    var host   = document.getElementById('neon-spectrum');
    var canvas = host.querySelector('canvas');
    var ctx    = canvas.getContext('2d');
    var w = 0, h = 0, dpr = 1, t = 0, raf;

    function resize() {
      var rect = canvas.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = rect.width; h = rect.height;
      canvas.width  = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // radial offset of a ring at angle `a`, layer `L`, time `t`
    function offsetAt(a, L, time, unit) {
      var v = Math.sin(5 * a + L * 0.34 + time)
            + 0.62 * Math.sin(3 * a - L * 0.20 - time * 0.8 + 1.2)
            + 0.40 * Math.sin(8 * a + L * 0.12 + time * 1.25 + 2.1)
            + 0.30 * Math.sin(2 * a - L * 0.08 - time * 0.5);
      return (v / 2.32) * unit;
    }

    // left = magenta, right = cyan-blue
    function colorFor(nx, alpha) {
      var hue = 300 - nx * 110;
      var light = 58 + nx * 6;
      return 'hsla(' + hue + ', 92%, ' + light + '%, ' + alpha + ')';
    }

    function draw() {
      t += 0.016 * MOTION_SPEED;

      ctx.clearRect(0, 0, w, h);

      var cx = w / 2, cy = h / 2;
      var size = Math.min(w, h);
      var baseR = size * 0.20;
      var dotR = Math.max(0.8, size * 0.0024);

      // soft glow halos behind the ring
      function halo(x, y, r, col) {
        var g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, col);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }
      ctx.globalCompositeOperation = DARK ? 'lighter' : 'source-over';
      var ha = DARK ? 0.55 : 0.30;
      halo(cx - baseR * 0.95, cy - baseR * 0.8,  baseR * 2.4, 'hsla(305,95%,62%,' + ha + ')');
      halo(cx + baseR * 1.10, cy + baseR * 0.25, baseR * 2.4, 'hsla(225,95%,62%,' + ha + ')');
      halo(cx + baseR * 0.25, cy + baseR * 1.15, baseR * 2.2, 'hsla(195,95%,60%,' + (ha * 0.9) + ')');
      halo(cx - baseR * 0.40, cy + baseR * 0.90, baseR * 2.1, 'hsla(280,90%,62%,' + (ha * 0.8) + ')');

      // flowing concentric dotted rings (the spectrum wave field)
      var RINGS = 26;
      var gap = size * 0.0072;
      var waveUnit = size * 0.055 * WAVE_INTENSITY;
      var spanR = baseR + RINGS * gap + waveUnit;
      var N = 240;

      for (var L = 0; L < RINGS; L++) {
        var ringFade = Math.pow(1 - L / RINGS, 1.25);
        var layerWeight = Math.pow(L / (RINGS - 1), 0.85); // inner ring stays round
        for (var i = 0; i < N; i++) {
          var a = (i / N) * Math.PI * 2;
          var r = baseR + L * gap + offsetAt(a, L, t, waveUnit) * layerWeight;
          var x = cx + Math.cos(a) * r;
          var y = cy + Math.sin(a) * r;
          var nx = Math.min(1, Math.max(0, 0.5 + (x - cx) / (spanR * 1.7)));
          var alpha = (DARK ? 0.9 : 0.82) * ringFade;
          if (alpha < 0.02) continue;
          ctx.beginPath();
          ctx.fillStyle = colorFor(nx, alpha);
          ctx.arc(x, y, dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalCompositeOperation = 'source-over';
      raf = requestAnimationFrame(draw);
    }

    draw(); // paint the first frame immediately
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) { cancelAnimationFrame(raf); raf = requestAnimationFrame(draw); }
    });
  })();
  </script>
</body>
</html>
