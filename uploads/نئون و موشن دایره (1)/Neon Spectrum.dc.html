<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
  </style>
</helmet>
<div style="position: relative; width: 100%; height: 100vh; min-height: 100%; display: flex; align-items: center; justify-content: center; background: {{ bgColor }}; overflow: hidden;">
  <canvas ref="{{ canvasRef }}" style="width: 100%; height: 100%; display: block;"></canvas>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 600, &quot;height&quot;: 600 },
  &quot;background&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;light&quot;, &quot;dark&quot;], &quot;default&quot;: &quot;light&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;motionSpeed&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.1, &quot;max&quot;: 3, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot; },
  &quot;waveIntensity&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.3, &quot;max&quot;: 2.5, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot; }
}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.canvasRef = React.createRef();
    this.t = 0;
  }

  renderVals() {
    const dark = (this.props.background ?? "light") === "dark";
    return {
      canvasRef: this.canvasRef,
      bgColor: dark ? "#08070d" : "#ffffff",
    };
  }

  componentDidMount() {
    const canvas = this.canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    let w = 0, h = 0, dpr = 1;

    const resize = () => {
      const rect = canvas.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = rect.width; h = rect.height;
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    this._resize = resize;
    window.addEventListener("resize", resize);

    // radial offset of a ring at angle `a`, layer `L`, time `t`.
    // Low-frequency sines give ~5-6 petals; the per-layer phase shift makes the
    // concentric rings bunch and spread into flowing wave streams (like the source).
    const offsetAt = (a, L, t, unit) => {
      const v =
        Math.sin(5 * a + L * 0.34 + t) +
        0.62 * Math.sin(3 * a - L * 0.20 - t * 0.8 + 1.2) +
        0.40 * Math.sin(8 * a + L * 0.12 + t * 1.25 + 2.1) +
        0.30 * Math.sin(2 * a - L * 0.08 - t * 0.5);
      return (v / 2.32) * unit; // normalize to ~[-unit, unit]
    };

    // neon palette mapped left(pink/magenta) -> right(blue/cyan) like the source
    const colorFor = (nx, alpha) => {
      const hue = 300 - nx * 110;          // 300 (magenta) -> 190 (cyan)
      const light = 58 + nx * 6;
      return `hsla(${hue}, 92%, ${light}%, ${alpha})`;
    };

    const dark = (this.props.background ?? "light") === "dark";

    const draw = () => {
      const speed = this.props.motionSpeed ?? 1;
      const intensity = this.props.waveIntensity ?? 1;
      this.t += 0.016 * speed;
      const t = this.t;

      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const size = Math.min(w, h);
      const baseR = size * 0.20;            // inner radius of the ring band
      const dotR = Math.max(0.8, size * 0.0024);

      // --- soft glow halos behind the ring ---
      const halo = (x, y, r, col) => {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, col);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      };
      ctx.globalCompositeOperation = dark ? "lighter" : "source-over";
      const ha = dark ? 0.55 : 0.30;
      halo(cx - baseR * 0.95, cy - baseR * 0.8, baseR * 2.4, `hsla(305,95%,62%,${ha})`);
      halo(cx + baseR * 1.1, cy + baseR * 0.25, baseR * 2.4, `hsla(225,95%,62%,${ha})`);
      halo(cx + baseR * 0.25, cy + baseR * 1.15, baseR * 2.2, `hsla(195,95%,60%,${ha * 0.9})`);
      halo(cx - baseR * 0.4, cy + baseR * 0.9, baseR * 2.1, `hsla(280,90%,62%,${ha * 0.8})`);

      // --- flowing concentric dotted rings (the "spectrum" wave field) ---
      ctx.globalCompositeOperation = dark ? "lighter" : "source-over";
      const RINGS = 26;
      const gap = size * 0.0072;               // base spacing between rings
      const waveUnit = size * 0.055 * intensity; // how far rings swing -> bunching
      const spanR = baseR + RINGS * gap + waveUnit;
      const N = 240;                            // dots per ring

      for (let L = 0; L < RINGS; L++) {
        const ringFade = Math.pow(1 - L / RINGS, 1.25); // outer rings fade out
        // inner rings stay round (clean center hole); outer rings swing freely
        const layerWeight = Math.pow(L / (RINGS - 1), 0.85);
        for (let i = 0; i < N; i++) {
          const a = (i / N) * Math.PI * 2;
          const r = baseR + L * gap + offsetAt(a, L, t, waveUnit) * layerWeight;
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          // color by horizontal position -> left magenta, right cyan-blue
          const nx = Math.min(1, Math.max(0, 0.5 + (x - cx) / (spanR * 1.7)));
          const alpha = (dark ? 0.9 : 0.82) * ringFade;
          if (alpha < 0.02) continue;
          ctx.beginPath();
          ctx.fillStyle = colorFor(nx, alpha);
          ctx.arc(x, y, dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.globalCompositeOperation = "source-over";
      raf = requestAnimationFrame(draw);
    };
    draw(); // paint first frame immediately (rAF is paused while the tab is hidden)
    // keep ticking when the tab becomes visible again
    const onVis = () => { if (!document.hidden) { cancelAnimationFrame(raf); raf = requestAnimationFrame(draw); } };
    document.addEventListener("visibilitychange", onVis);
    this._onVis = onVis;
    this._raf = () => cancelAnimationFrame(raf);
  }

  componentWillUnmount() {
    if (this._raf) this._raf();
    if (this._resize) window.removeEventListener("resize", this._resize);
    if (this._onVis) document.removeEventListener("visibilitychange", this._onVis);
  }
}
</script>
</body>
</html>
